<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626" />
      <stop offset="40%" style="stop-color:#ef4444" />
      <stop offset="60%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <line x1="0" y1="40" x2="800" y2="40" stroke="#1f1f2e" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="80" x2="800" y2="80" stroke="#1f1f2e" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="#1f1f2e" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#1f1f2e" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="#1f1f2e" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="0" x2="200" y2="200" stroke="#1f1f2e" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="0" x2="600" y2="200" stroke="#1f1f2e" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="0" x2="700" y2="200" stroke="#1f1f2e" stroke-width="0.5" opacity="0.3"/>

  <g transform="translate(80, 60)" filter="url(#glow)">
    <path d="M30 80 L15 30 Q10 15 20 20 L35 40 L30 80Z" fill="url(#claw)" opacity="0.9"/>
    <path d="M40 80 L35 25 Q32 8 42 15 L45 40 L40 80Z" fill="url(#claw)"/>
    <path d="M50 80 L55 25 Q58 8 48 15 L45 40 L50 80Z" fill="url(#claw)"/>
    <path d="M60 80 L75 30 Q80 15 70 20 L55 40 L60 80Z" fill="url(#claw)" opacity="0.9"/>
    <ellipse cx="45" cy="85" rx="25" ry="12" fill="url(#claw)" opacity="0.7"/>
  </g>

  <g transform="translate(240, 55)">
    <text font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="56" font-weight="900" fill="url(#textGrad)" filter="url(#glow)">
      ClawPunch
    </text>
    <text y="36" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="14" fill="#6b7280" letter-spacing="6">
      SOLANA AI AGENT SWARM
    </text>
  </g>

  <g transform="translate(240, 130)" opacity="0.6">
    <rect x="0" y="0" width="8" height="8" rx="1" fill="#dc2626"/>
    <text x="14" y="8" font-family="monospace" font-size="10" fill="#9ca3af">8 Agents</text>
    <rect x="90" y="0" width="8" height="8" rx="1" fill="#f59e0b"/>
    <text x="104" y="8" font-family="monospace" font-size="10" fill="#9ca3af">Claude 4.5</text>
    <rect x="195" y="0" width="8" height="8" rx="1" fill="#8b5cf6"/>
    <text x="209" y="8" font-family="monospace" font-size="10" fill="#9ca3af">Solana Native</text>
    <rect x="310" y="0" width="8" height="8" rx="1" fill="#10b981"/>
    <text x="324" y="8" font-family="monospace" font-size="10" fill="#9ca3af">100% Real Data</text>
  </g>

  <g transform="translate(660, 50)" opacity="0.15">
    <polygon points="40,0 80,25 65,70 15,70 0,25" fill="none" stroke="#dc2626" stroke-width="1"/>
    <polygon points="50,10 80,30 70,65 30,65 20,30" fill="none" stroke="#f59e0b" stroke-width="0.5"/>
    <polygon points="60,20 80,35 72,58 48,58 40,35" fill="none" stroke="#dc2626" stroke-width="0.5"/>
  </g>

  <rect x="0" y="0" width="800" height="200" rx="12" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.2"/>
</svg>
